services:
  - type: web
    name: culturally-connect-png
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11.1.0 --activate && pnpm install --frozen-lockfile && pnpm run build:deploy
    startCommand: pnpm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: VITE_MEDIA_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
